<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Piratas del Caribe</title>
  <link rel="stylesheet" href="/css/estilo.css" />
</head>
<body>
  <h1>🏴‍☠️ Piratas del Caribe</h1>
  <p class="subtitulo">Iniciar sesión</p>

  <div class="card">
    <form id="formLogin">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Contraseña" required />
      <button type="submit">Entrar</button>
    </form>
    <p class="mensaje" id="mensaje"></p>
    <p><a class="link" href="/register.html">¿No tenés cuenta? Registrate</a></p>
  </div>

  <script>
    document.getElementById('formLogin').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const mensaje = document.getElementById('mensaje');
      mensaje.textContent = '';
      mensaje.className = 'mensaje';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          mensaje.textContent = data.error || 'No se pudo iniciar sesión';
          mensaje.classList.add('error');
          return;
        }

        window.location.href = '/dashboard.html';
      } catch (err) {
        mensaje.textContent = 'Error de conexión con el servidor';
        mensaje.classList.add('error');
      }
    });
  </script>
</body>
</html>
