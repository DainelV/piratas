<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil - Piratas del Caribe</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="container">
      <nav>
        <a href="/dashboard.html">🏠 Dashboard</a>
        <a href="/perfil.html">👤 Perfil</a>
        <a href="/pvp.html">⚔️ Batallas</a>
        <a href="#" id="logoutBtn">🚪 Salir</a>
      </nav>

      <h1>👤 Perfil del Pirata</h1>

      <div class="profile-grid">
        <div class="card">
          <h3>📊 Datos Generales</h3>
          <p><strong>Email:</strong> <span id="email"></span></p>
          <p><strong>Nivel:</strong> <span id="nivel">1</span></p>
          <p><strong>Oro:</strong> <span id="oro">0</span></p>
          <p>
            <strong>Piratas (Referidos):</strong> <span id="piratas">0</span>
          </p>
        </div>

        <div class="card">
          <h3>⚓ Estado del Barco</h3>
          <p>
            <strong>HP:</strong> <span id="hp">100</span>/<span id="hpMax"
              >100</span
            >
          </p>
          <p><strong>Velas:</strong> <span id="velas">1</span></p>
          <p><strong>Cañones:</strong> <span id="canones">1</span></p>
          <p><strong>Casco:</strong> <span id="casco">1</span></p>
          <p><strong>Nivel de Barco:</strong> <span id="nivelBarco">0</span></p>
          <button id="repararBtn" class="btn">🔧 Reparar Barco</button>
          <p id="reparacionInfo"></p>
        </div>

        <div class="card">
          <h3>⬆️ Subir de Nivel</h3>
          <div id="levelInfo"></div>
          <button id="subirNivelBtn" class="btn">⚡ Subir de Nivel</button>
          <p id="levelError" class="error"></p>
        </div>

        <div class="card">
          <h3>🏆 Estadísticas PvP</h3>
          <p><strong>Victorias:</strong> <span id="victorias">0</span></p>
          <p><strong>Derrotas:</strong> <span id="derrotas">0</span></p>
        </div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/perfil.js"></script>
  </body>
</html>
